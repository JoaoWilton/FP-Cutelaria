# =============================================================================
# FP Cutelaria — configuração de desenvolvimento/apresentação
# =============================================================================
quarkus.http.port=8080

# -----------------------------------------------------------------------------
# Banco de dados — H2 EM MEMÓRIA
#
# Usar H2 elimina a dependência de Docker/Postgres para a apresentação:
# o Quarkus sobe sozinho, recria o schema do zero e popula os dados de
# teste via DataSeeder (classe Java) a cada reinício.
#
# Para usar Postgres novamente (ex: entrega final), comente o bloco H2
# abaixo e descomente o bloco "POSTGRES" mais abaixo.
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:fpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# -----------------------------------------------------------------------------
# POSTGRES (alternativa — descomente e comente o bloco H2 acima para usar)
# -----------------------------------------------------------------------------
# quarkus.datasource.db-kind=postgresql
# quarkus.datasource.username=postgres
# quarkus.datasource.password=465
# quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/fpbd
# quarkus.hibernate-orm.database.generation=drop-and-create
# quarkus.hibernate-orm.log.sql=true

# -----------------------------------------------------------------------------
# OpenAPI / Swagger
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# -----------------------------------------------------------------------------
# JWT — as chaves ficam em src/main/resources/META-INF/resources/
# (caminho relativo ao classpath; NÃO usar "privateKey.pem" sozinho)
# -----------------------------------------------------------------------------
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# -----------------------------------------------------------------------------
# Mailer — mock em dev/test (não envia e-mail real, apenas loga / aparece na Dev UI)
# -----------------------------------------------------------------------------
%dev.quarkus.mailer.mock=true
%test.quarkus.mailer.mock=true
quarkus.mailer.from=naoresponda@fpcutelaria.com.br

# -----------------------------------------------------------------------------
# Dados de teste: NÃO usamos mais import.sql para usuários (evita problemas
# de hash bcrypt gerado fora da aplicação). Ver DataSeeder.java, que cria
# os usuários de teste e o catálogo de demonstração no startup, usando
# BcryptUtil.bcryptHash() diretamente — garantindo compatibilidade com
# AuthService.login().
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# JWT — forçar validação do issuer (rejeita tokens inválidos/expirados)
# -----------------------------------------------------------------------------
mp.jwt.verify.issuer=https://localhost:8080

# Rejeitar requisições com token malformado (em vez de tratar como anônimo)
quarkus.http.auth.proactive=true
